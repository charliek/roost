name: sanity-check-app

# Manual verification that the charliek-release-bot GitHub App is wired into
# every repo roost's release.yml touches: roost itself (for the appcast push)
# and charliek/apt-charliek (for the publish dispatch). Run from the Actions
# UI ("Run workflow") after setting the RELEASE_BOT_APP_* secrets and
# confirming the App is installed on both repos.
#
# Useful when:
#   * first wiring the App into a new repo (verify before touching release.yml)
#   * rotating the App's private key (re-verify after updating the secret)
#   * migrating to a new App
#   * after adopting a new cross-repo target
#
# Each block mints a short-lived installation token scoped to one repo and
# calls a read-only endpoint. A failure to mint, or a 404 on the reach check,
# means the App isn't installed on that repo — fix the install before the
# next release runs.
#
# Bot identity comes from the action's `app-slug` output, NOT
# `gh api /user`, which returns 403 for installation tokens (they don't
# authenticate as a user).
#
# Companion to release.yml's appcast push and apt-charliek dispatch (#122, #136).

on:
  workflow_dispatch: {}

permissions: {}   # explicit: this workflow needs nothing from the workflow token

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      # ── 1. self (charliek/roost — appcast push target) ──
      - id: self-token
        uses: actions/create-github-app-token@v3
        with:
          client-id:      ${{ secrets.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_KEY }}

      - name: Token sees roost + bot identity
        env:
          GH_TOKEN: ${{ steps.self-token.outputs.token }}
          BOT_SLUG: ${{ steps.self-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          echo "::group::This repo (must print charliek/roost)"
          gh api "/repos/${GITHUB_REPOSITORY}" --jq '.full_name'
          echo "::endgroup::"

          echo "::group::Installation repository count (must be ≥1)"
          # Count only — the App also installs on private repos and printing
          # names in this public workflow log would leak them.
          gh api /installation/repositories --jq '.total_count'
          echo "::endgroup::"

          # Installation tokens can't call /user (403 "Resource not accessible by
          # integration") — bot identity comes from the action's app-slug output.
          echo "::group::Bot identity (should end with [bot])"
          echo "${BOT_SLUG}[bot]"
          echo "::endgroup::"

      # ── 2. charliek/apt-charliek (publish dispatch target) ──
      - id: apt-token
        uses: actions/create-github-app-token@v3
        with:
          client-id:      ${{ secrets.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_KEY }}
          owner:        charliek
          repositories: apt-charliek

      - name: Token can reach charliek/apt-charliek
        env:
          GH_TOKEN: ${{ steps.apt-token.outputs.token }}
        run: |
          set -euo pipefail
          echo "::group::charliek/apt-charliek (must print the same)"
          gh api "/repos/charliek/apt-charliek" --jq '.full_name'
          echo "::endgroup::"
