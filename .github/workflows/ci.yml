name: CI

on:
  push:
    branches: [main, 'feature/*', 'claude/discuss-architecture-refactor-*']
  pull_request:
    branches: [main, 'feature/*', 'claude/discuss-architecture-refactor-*']

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # Both platforms install the full GTK4 + libadwaita stack so that
      # cmd/roost builds on each. gotk4-adwaita is pinned to a commit
      # that targets libadwaita 1.5 symbols, which matches Ubuntu 24.04
      # / Pop!_OS noble's apt candidate. macOS Homebrew ships a newer
      # libadwaita but the binding only uses the 1.5 surface, so this
      # works on both.
      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install gtk4 libadwaita pkgconf gobject-introspection
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev libadwaita-1-dev \
            libpango1.0-dev libcairo2-dev \
            pkgconf gobject-introspection libgirepository1.0-dev

      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - name: Cache Go modules + build cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/Library/Caches/go-build
          key: gomod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: gomod-${{ runner.os }}-

      - name: Cache libghostty-vt
        id: cache-libghostty
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            build/out
            build/ghostty-src
          key: libghostty-${{ runner.os }}-${{ hashFiles('build/build.sh') }}

      - name: Build libghostty-vt
        if: steps.cache-libghostty.outputs.cache-hit != 'true'
        run: ./build/build.sh libghostty

      - name: Vet + test + build
        run: |
          go vet ./...
          go test ./...
          go build ./cmd/roost ./cmd/roost-cli

      - name: Assert no dynamic ghostty-vt link (macOS regression guard)
        if: runner.os == 'macOS'
        run: |
          if otool -L ./roost | grep -q '@rpath/libghostty-vt'; then
            echo "FAIL: roost is dynamically linked to libghostty-vt; reintroduces the dyld @rpath bug fixed in build/build.sh."
            otool -L ./roost
            exit 1
          fi

      - name: Assert no dynamic ghostty-vt link (Linux regression guard)
        if: runner.os == 'Linux'
        run: |
          if ldd ./roost | grep -q libghostty-vt; then
            echo "FAIL: roost is dynamically linked to libghostty-vt; the cgo directive in internal/ghostty/terminal.go is supposed to statically link the .a."
            ldd ./roost
            exit 1
          fi

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: gomod-race-ubuntu-${{ hashFiles('**/go.sum') }}
          restore-keys: gomod-race-ubuntu-
      - name: Race detector on non-cgo packages
        run: go test -race ./internal/ipc/ ./internal/osc/ ./internal/core/ ./internal/store/ ./internal/config/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # Lint runs cgo preprocessing across the whole module, including
      # cmd/roost (gotk4 + gotk4-adwaita) and internal/pangoextra
      # (pangocairo via pkg-config), so we need the full GTK4 +
      # libadwaita dev headers, not just Pango/Cairo.
      - name: Install GTK4 + libadwaita dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev libadwaita-1-dev \
            libpango1.0-dev libcairo2-dev \
            pkgconf gobject-introspection libgirepository1.0-dev

      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - name: Cache Go modules + build cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: gomod-lint-ubuntu-${{ hashFiles('**/go.sum') }}
          restore-keys: gomod-lint-ubuntu-

      - name: Cache libghostty-vt (shares Linux test job's key)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            build/out
            build/ghostty-src
          key: libghostty-Linux-${{ hashFiles('build/build.sh') }}

      - name: Build libghostty-vt (only on cache miss)
        run: |
          if [ ! -f build/out/lib/libghostty-vt.a ]; then
            ./build/build.sh libghostty
          fi

      - run: golangci-lint run ./...
