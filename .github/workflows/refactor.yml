name: Refactor CI

# CI for the architectural refactor described in docs/development/vision.md.
# Sibling to .github/workflows/ci.yml — the existing Go CI continues to run
# unchanged on the refactor branch and remains authoritative for the Go
# binary on main. New jobs land additively here.
#
# Phase 2 jobs:
#   - rust-lint  : cargo fmt + clippy on the Cargo workspace.
#   - rust-build : cargo build/test on Linux + macOS.
#   - swift-mac  : swift build on macOS for the Mac UI skeleton.
#
# Phases 5/7 add: mac-ui-build (xcodebuild), linux-ui-build (gtk4-rs).
# Phase 8: release-bundle on tags.

on:
  push:
    branches: ['claude/discuss-architecture-refactor-*']
  # `pull_request.branches` matches the PR's BASE (target) branch, not the
  # head (source). Refactor PRs target `main`, so that's what we filter
  # on here. The job-level `if:` guards below restrict execution to PRs
  # whose head branch is in the refactor namespace, so we don't run the
  # Rust+Swift toolchain on every Go-only PR into main.
  pull_request:
    branches: ['main']

# Each job below carries the same `if:` guard. `pull_request.branches` only
# filters the PR target, so the per-job `startsWith(github.head_ref, ...)`
# check is what scopes execution to refactor-source PRs. Push events have
# `head_ref == ''`, hence the explicit `event_name == 'push'` branch.

jobs:
  rust-lint:
    if: >-
      github.event_name == 'push' ||
      startsWith(github.head_ref, 'claude/discuss-architecture-refactor-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-lint-${{ runner.os }}-${{ hashFiles('**/Cargo.toml', 'rust-toolchain.toml') }}
          restore-keys: cargo-lint-${{ runner.os }}-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        # Phase 2 latitude: clippy still informational while crates settle.
        # Flip continue-on-error off at Phase 3 exit (roost-core MVP working).
        continue-on-error: true
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-build:
    if: >-
      github.event_name == 'push' ||
      startsWith(github.head_ref, 'claude/discuss-architecture-refactor-')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.toml', 'rust-toolchain.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: cargo build (workspace, default features)
        # Default features: roost-vt's `ffi` feature is OFF, so libghostty-vt
        # is not required for this build. The libghostty-vt build job lands
        # in Phase 3 once roost-vt is actually exercised by roost-core.
        run: cargo build --workspace --all-targets

      - name: cargo test
        # Time-boxed exception. `continue-on-error` lifts at the Phase 3
        # exit milestone (roost-core MVP serving on UDS, smoke client
        # round-trip), tracked in docs/development/vision.md.
        continue-on-error: true
        run: cargo test --workspace

  swift-mac:
    if: >-
      github.event_name == 'push' ||
      startsWith(github.head_ref, 'claude/discuss-architecture-refactor-')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Show Swift toolchain
        run: swift --version

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            mac/.build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('mac/Package.swift', 'mac/Package.resolved') }}
          restore-keys: swiftpm-${{ runner.os }}-

      # Time-boxed exception. `continue-on-error: true` lifts at the
      # Phase 6 exit milestone (Mac feature parity with the current Go
      # binary), at which point the swift-mac job becomes
      # required-green-on-every-commit. Tracked in mac/README.md and
      # docs/development/vision.md. Reasons it's transitional today:
      #   * grpc-swift v2 codegen path (SwiftPM build plugin vs.
      #     checked-in protoc-gen-grpc-swift-2 output) is still
      #     in flight.
      #   * libghostty-vt FFI from Swift is unverified.
      - name: swift build
        continue-on-error: true
        working-directory: mac
        run: swift build -v

      - name: swift test
        continue-on-error: true
        working-directory: mac
        run: swift test
