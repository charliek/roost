name: Refactor CI

# CI for the architectural refactor described in docs/development/vision.md.
# Sibling to .github/workflows/ci.yml — the existing Go CI continues to run
# unchanged on the refactor branch and remains authoritative for the Go
# binary on main. New jobs land additively here.
#
# Phase 2 jobs:
#   - rust-lint  : cargo fmt + clippy on the Cargo workspace.
#   - rust-build : cargo build/test on Linux + macOS.
#   - swift-mac  : swift build on macOS for the Mac UI skeleton.
#
# Phases 5/7 add: mac-ui-build (xcodebuild), linux-ui-build (gtk4-rs).
# Phase 8: release-bundle on tags.

on:
  push:
    branches:
      - 'claude/discuss-architecture-refactor-*'
      - 'feature/rust-port'
  # `pull_request.branches` matches the PR's BASE (target) branch, not the
  # head (source). Refactor PRs land into either `main` (legacy
  # cjU3E -> main flow) or `feature/rust-port` (the long-lived polish
  # branch — see plans/goal-rust-port-polish-2026-05-16.md). Job-level
  # `if:` guards below restrict execution to PRs whose head branch is in
  # the refactor / polish namespace so we don't run the Rust+Swift
  # toolchain on every Go-only PR into main.
  pull_request:
    branches:
      - 'main'
      - 'feature/rust-port'

# Each job below carries the same `if:` guard. `pull_request.branches` only
# filters the PR target, so the per-job `startsWith(github.head_ref, ...)`
# check is what scopes execution to refactor-source PRs. Push events have
# `head_ref == ''`, hence the explicit `event_name == 'push'` branch.

jobs:
  rust-lint:
    if: >-
      github.event_name == 'push' ||
      startsWith(github.head_ref, 'claude/discuss-architecture-refactor-') ||
      startsWith(github.head_ref, 'feature/rust-port') ||
      startsWith(github.head_ref, 'polish/') ||
      startsWith(github.head_ref, 'refactor/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-lint-${{ runner.os }}-${{ hashFiles('**/Cargo.toml', 'rust-toolchain.toml') }}
          restore-keys: cargo-lint-${{ runner.os }}-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        # Phase 2 latitude: clippy still informational while crates settle.
        # Flip continue-on-error off at Phase 3 exit (roost-core MVP working).
        # `--exclude roost-linux` because that crate needs GTK4 +
        # libadwaita installed — handled by the dedicated `gtk-build`
        # job (Phase 6a M8) instead of bloating this lint runner.
        continue-on-error: true
        run: cargo clippy --workspace --exclude roost-linux --all-targets -- -D warnings

  rust-build:
    if: >-
      github.event_name == 'push' ||
      startsWith(github.head_ref, 'claude/discuss-architecture-refactor-') ||
      startsWith(github.head_ref, 'feature/rust-port') ||
      startsWith(github.head_ref, 'polish/') ||
      startsWith(github.head_ref, 'refactor/')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install protoc + libclang (Linux)
        if: runner.os == 'Linux'
        # libclang-dev is needed by bindgen when roost-vt is built with
        # `--features ffi`. macOS gets it via Xcode's command-line tools
        # which the runner has preinstalled.
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libclang-dev

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: jdx/mise-action@v2

      - name: Cache vendored libghostty-vt
        # Keyed on the build script + the SHA pin inside it. A bump to
        # third_party/ghostty/build.sh invalidates and rebuilds — same
        # discipline as the legacy build/build.sh cache in ci.yml.
        id: cache-ghostty
        uses: actions/cache@v4
        with:
          path: |
            third_party/ghostty/out
            third_party/ghostty/src
          key: vendored-ghostty-${{ runner.os }}-${{ hashFiles('third_party/ghostty/build.sh') }}

      - name: Build libghostty-vt
        if: steps.cache-ghostty.outputs.cache-hit != 'true'
        run: ./third_party/ghostty/build.sh

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.toml', 'rust-toolchain.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: cargo build (workspace, default features)
        # Default features: roost-vt's `ffi` feature is OFF, so this
        # build does not consume libghostty-vt. Keeps the non-ffi
        # workspace green even if the Ghostty build itself bit-rots.
        # `--exclude roost-linux` because that crate needs GTK4 +
        # libadwaita installed — the dedicated `gtk-build` job
        # (Phase 6a M8) does the GTK build separately so the
        # default-features path stays toolchain-cheap.
        run: cargo build --workspace --exclude roost-linux --all-targets

      - name: cargo build (roost-vt with ffi)
        # Time-boxed exception. `continue-on-error` lifts when the FFI
        # surface stabilises (Phase 5 step 3 exit). Today the smoke
        # exercises ghostty_terminal_new + write + free; bindgen field
        # names may differ slightly from my best-guess at the C struct
        # layout, in which case CI surfaces the exact compile error.
        continue-on-error: true
        run: cargo build -p roost-vt --features ffi

      - name: cargo test (roost-vt ffi smoke)
        # Same time-boxed exception as the ffi build above. Lifts at
        # Phase 5 step 3 exit.
        continue-on-error: true
        run: cargo test -p roost-vt --features ffi -- --nocapture

      - name: cargo test
        # Required-green: the workspace test suite gates every commit.
        # If a Rust test breaks on Linux or macOS the workflow fails.
        # `--exclude roost-linux` for the same reason as the build
        # step above — the GTK toolchain lives in the gtk-build job.
        run: cargo test --workspace --exclude roost-linux

  swift-mac:
    if: >-
      github.event_name == 'push' ||
      startsWith(github.head_ref, 'claude/discuss-architecture-refactor-') ||
      startsWith(github.head_ref, 'feature/rust-port') ||
      startsWith(github.head_ref, 'polish/') ||
      startsWith(github.head_ref, 'refactor/')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Show Swift toolchain
        run: swift --version

      - name: Install protoc
        # GRPCProtobufGenerator's deriveProtocPath() needs a real protoc
        # binary to run — the SwiftPM-bundled tooling produces only
        # protoc-gen-swift / protoc-gen-grpc-swift-2 (the plugin half).
        run: brew install protobuf

      - uses: jdx/mise-action@v2

      - name: Cache vendored libghostty-vt
        # Same shape (and same key) as the rust-build matrix's cache:
        # both jobs share the artifact, so the second runner-os miss
        # would still be a hit. SHA pin lives in build.sh, hashFiles
        # invalidates on any bump.
        id: cache-ghostty
        uses: actions/cache@v4
        with:
          path: |
            third_party/ghostty/out
            third_party/ghostty/src
          key: vendored-ghostty-${{ runner.os }}-${{ hashFiles('third_party/ghostty/build.sh') }}

      - name: Build libghostty-vt
        # Required before `swift build` because the CGhosttyVT system
        # library target's module map references
        # ../../../third_party/ghostty/out/include/ghostty/vt.h, and
        # the Roost target's linkerSettings reference the static
        # archive at third_party/ghostty/out/lib/libghostty-vt.a.
        if: steps.cache-ghostty.outputs.cache-hit != 'true'
        run: ./third_party/ghostty/build.sh

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            mac/.build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('mac/Package.swift', 'mac/Package.resolved') }}
          restore-keys: swiftpm-${{ runner.os }}-

      # Required-green from this commit on. `continue-on-error: true`
      # was masking real coordinate breakage in Package.swift (the
      # initial grpc-swift v2 wiring landed with the wrong package URL
      # + plugin name; user manual `swift run` exposed it). Letting
      # build/test fail the workflow forces every commit to keep the
      # Swift surface compiling. Phase 6+ Xcode bundling adds further
      # steps that may need their own time-boxing when they land, but
      # baseline `swift build` + `swift test` should always be blocking
      # — they're the cross-platform contract on the Mac side.
      #
      # PROTOC_PATH is honored by GRPCProtobufGenerator's discovery
      # function (PluginsShared/PluginUtils.swift::deriveProtocPath) when
      # the plugin can't find protoc via SwiftPM's tool registry —
      # which is the case for any system-installed protoc since SwiftPM
      # only resolves tools that are package-graph products or binary
      # targets. We point it at whatever `brew install protobuf` put on
      # PATH so this works on both arm64 (/opt/homebrew/bin) and Intel
      # (/usr/local/bin) macOS runners.
      - name: swift build
        working-directory: mac
        run: PROTOC_PATH="$(which protoc)" swift build -v

      # Mirrors the macOS regression guard in ci.yml for the legacy Go
      # binary: zig's libghostty-vt build emits both a static archive
      # and a dylib, and `-L<dir> -lghostty-vt` makes ld pick the
      # dylib + embed an @rpath/libghostty-vt.dylib reference that
      # crashes at launch (no LC_RPATH). Package.swift passes the
      # archive's path positionally to side-step this; this guard
      # makes regressions immediate rather than letting them resurface
      # in someone's runtime later.
      - name: Assert no dynamic ghostty-vt link (regression guard)
        working-directory: mac
        run: |
          for bin in $(find .build -type f -perm -u+x -name 'Roost' -o -name 'RoostPackageTests'); do
            if otool -L "$bin" 2>/dev/null | grep -q '@rpath/libghostty-vt'; then
              echo "FAIL: $bin is dynamically linked to libghostty-vt; reintroduces the dyld @rpath bug fixed in Package.swift's positional-archive linkerSettings."
              otool -L "$bin"
              exit 1
            fi
          done

      # Live-daemon regression guard. Without this, the gRPC layer
      # between grpc-swift-nio-transport and tonic was silently broken
      # over UDS for the entire Phase 5 series — the `:authority`
      # pseudo-header defaulted to the socket path, tonic's h2 layer
      # RST_STREAM'd every RPC with PROTOCOL_ERROR, and no test
      # caught it because nothing dialed a real daemon. `swift test`
      # alone covers compile-time / packaging regressions; this step
      # adds the end-to-end gRPC round-trip the unit tests can't.
      #
      # Tools cargo + Rust here use the toolchain pinned in
      # rust-toolchain.toml (same as the rust-build job) so the
      # daemon binary built for this step matches what users run.
      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache cargo registry + target (shared with rust-build)
        # Same key as rust-build's macos-latest cache so the daemon
        # binary is usually already compiled by the time we get here.
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.toml', 'rust-toolchain.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      # M3b of the daemon-removal refactor (2026-05-23): the
      # `liveIdentifyAgainstDaemon` Swift test was a regression guard
      # for the gRPC `:authority` UDS edge case. With the Linux UI
      # off gRPC (M3b) and the Mac UI moving off it next (M4), the
      # test is on borrowed time. M3b skips the daemon-startup + env
      # injection here; M4 deletes the dormant Swift test method
      # entirely. `swift test` still runs all the other tests
      # (renderer, OSC scanner, etc.) with `ROOST_LIVE_TEST_SOCKET`
      # unset, so the live-daemon test method no-ops itself.
      - name: swift test
        working-directory: mac
        run: PROTOC_PATH="$(which protoc)" swift test

  # Phase 6a M8: gtk4-rs + libadwaita-rs build. Lives in
  # crates/roost-linux/, excluded from `default-members` in
  # Cargo.toml so a contributor without GTK installed can still
  # `cargo build`. CI installs the deps and builds explicitly.
  #
  # Runs on both ubuntu-latest (the eventual production target)
  # and macos-latest (cross-platform dev convenience for the Mac
  # UI maintainer). macos-latest only required at this milestone;
  # ubuntu-latest is informational while the spike settles.
  gtk-build:
    if: >-
      github.event_name == 'push' ||
      startsWith(github.head_ref, 'claude/discuss-architecture-refactor-') ||
      startsWith(github.head_ref, 'feature/rust-port') ||
      startsWith(github.head_ref, 'polish/') ||
      startsWith(github.head_ref, 'refactor/')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install GTK4 + libadwaita (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            pkg-config \
            protobuf-compiler

      - name: Install GTK4 + libadwaita (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gtk4 libadwaita pkg-config protobuf
          # Brew installs into /opt/homebrew; the gtk4 / libadwaita
          # .pc files live there. Surface them to pkg-config so the
          # subsequent `cargo build` resolves the system libs.
          echo "PKG_CONFIG_PATH=/opt/homebrew/lib/pkgconfig:/opt/homebrew/share/pkgconfig" >> "$GITHUB_ENV"

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: jdx/mise-action@v2

      - name: Cache vendored libghostty-vt
        # Phase 7 commit 2 makes roost-linux depend on
        # roost-vt --features ffi (transitively, via Cargo.toml),
        # which links libghostty-vt.a. Reuse the same cache key as
        # rust-build + swift-mac so we share the build artifact across
        # the matrix (rust-build runs first on the same SHA).
        id: cache-ghostty
        uses: actions/cache@v4
        with:
          path: |
            third_party/ghostty/out
            third_party/ghostty/src
          key: vendored-ghostty-${{ runner.os }}-${{ hashFiles('third_party/ghostty/build.sh') }}

      - name: Build libghostty-vt
        if: steps.cache-ghostty.outputs.cache-hit != 'true'
        run: ./third_party/ghostty/build.sh

      - name: Cache cargo registry + target (shared with rust-build)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.toml', 'rust-toolchain.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: cargo build -p roost-linux
        # Phase 6a M8 first cut: a single-window Identify spike. Phase
        # 7 commit 2 adds the roost-vt --features ffi + roost-osc
        # deps, so the build now also links libghostty-vt.a (warm-up
        # step above runs first). `continue-on-error` is intentionally
        # OFF — if this fails Phase 7 isn't moving forward.
        run: cargo build -p roost-linux
