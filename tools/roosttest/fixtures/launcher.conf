# E2E launcher fixtures. The command launcher (Cmd/Alt+Shift+T) reads this
# when the harness launches a UI with ROOST_CONFIG pointing here, so the
# launcher tests have a known, deterministic command list to drive.
#
# `hold=true` keeps the spawned shell open after the command runs, so the
# tab persists and its output stays dumpable (without hold the shell exits
# and the tab auto-closes). The markers are asserted by test_launcher.py.
command = label="Echo Marker" run="echo LAUNCH_MARKER=ok" hold=true
command = label="List Tmp" run="echo SECOND_CMD=ok" hold=true
# Prints the spawn cwd so test_newtab_cwd can assert the launcher
# (Cmd/Alt+Shift+T) inherits the active tab's live cwd.
command = label="Print Pwd" run="echo LAUNCH_PWD=$(pwd)" hold=true
