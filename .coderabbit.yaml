# CodeRabbit review configuration.
#
# Schema: https://docs.coderabbit.ai/getting-started/configure-coderabbit
#
# Topic branches (`polish/*`, `refactor/*`, feature branches) open PRs
# into `main`; auto-review runs on those.

reviews:
  auto_review:
    enabled: true
    base_branches:
      - "main"
  review_status: true
  profile: chill

language: en
tone_instructions: |
  Be direct and concrete. Cite code as `file:line`
  (e.g. `mac/Sources/Roost/App.swift:123`). CLAUDE.md and
  plans/ carry conventions and active milestones; reference
  them when feedback hinges on those decisions.
