# CodeRabbit review configuration.
#
# Schema: https://docs.coderabbit.ai/getting-started/configure-coderabbit
#
# The repo runs an active long-lived `feature/rust-port` branch
# (per `plans/goal-rust-port-polish-2026-05-16.md`) that accepts
# polish PRs from short-lived `polish/*` topic branches. CodeRabbit's
# default behavior is to skip auto-review on PRs targeting any
# non-default branch, which would silently break the
# "auto-merge when CI green + CodeRabbit clean" gate the goal
# established. Explicitly opt those base branches in.

reviews:
  auto_review:
    enabled: true
    base_branches:
      - "main"
      - "feature/rust-port"
  review_status: true
  profile: chill

language: en
tone_instructions: |
  Be direct and concrete. When citing code paths use the
  `file:line` format (e.g. `mac/Sources/Roost/App.swift:123`).
  Roost's CLAUDE.md and plans/goal-rust-port-polish-2026-05-16.md
  carry the project's conventions and active milestone schedule —
  reference them when feedback ties to those decisions.
